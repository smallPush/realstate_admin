services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # These should be overridden by Dokploy's environment variables
      DATABASE_URL: ${DATABASE_URL:-postgresql://app:!ChangeMe!@database:5432/app?serverVersion=16&charset=utf8}
      APP_SECRET: ${APP_SECRET:-$ecretf0rt3st}
      VAPI_API_KEY: ${VAPI_API_KEY:-}
      CADDY_GLOBAL_OPTIONS: "local_certs"
    ports:
      - "80:80"
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw

volumes:
  database_data:
